services:
  portal-api:
    image: python:3.11-slim
    working_dir: /app/backend
    command: sh -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  dataset-collector:
    image: python:3.11-slim
    working_dir: /app/services/dataset-collector
    command: sh -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8010"
    ports:
      - "8010:8010"
    volumes:
      - .:/app

  trainer:
    image: python:3.11-slim
    working_dir: /app/services/trainer
    command: sh -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8020"
    ports:
      - "8020:8020"
    volumes:
      - .:/app

